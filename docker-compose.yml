# Synology Container Manager: create a Project pointing at this folder -- it uses
# this compose file and builds the image on the NAS. Set THEKE_TMDB_API_KEY
# (Container Manager env field or a .env file next to this one) and adjust the
# two host paths below.
services:
  theke:
    # EITHER build locally
    build: .
    image: theke:local
    # OR pull from docker hub
    # image: xxxx/theke:latest
    container_name: theke
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - THEKE_TMDB_API_KEY=${THEKE_TMDB_API_KEY:-}
      - THEKE_TEMP_PATH=/temp
      - THEKE_LIBRARY_ROOT=/library
      - THEKE_LIBRARY_PATH=/library/{Title} ({Year})/{Title} ({Year}).mp4
    volumes:
      - ./build:/config           # theke.json + theke.db
      - ./build/movies:/library   # your movie library
      - ./build/temp:/temp        # use same volume as library for fast copy ops!
